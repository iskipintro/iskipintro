name: Deploy Worker
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "db/schema.ts"
      - "routes/**"
      - "services/**"
      - "types/**"
      - "wrangler.jsonc"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: npx wrangler deploy

      - name: Summary
        run: echo "✅ Worker deployed successfully!"
