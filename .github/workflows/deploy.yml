name: Deploy Data
on:
  push:
    branches: [main]
    paths:
      - "data/**/*.yaml"
      - "data/**/*.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Parse YAML and generate SQL
        run: node .github/scripts/generate-sql.mjs

      - name: Apply schema and migrations (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npx wrangler d1 execute iskipintro-db --file=./db/schema.sql
          # Add missing columns if upgrading from old schema (no-op if already exist)
          npx wrangler d1 execute iskipintro-db --command "ALTER TABLE series ADD COLUMN slug TEXT UNIQUE;" 2>/dev/null || true
          npx wrangler d1 execute iskipintro-db --command "ALTER TABLE markers ADD COLUMN source TEXT NOT NULL DEFAULT 'manual';" 2>/dev/null || true
          npx wrangler d1 execute iskipintro-db --command "ALTER TABLE movies ADD COLUMN slug TEXT UNIQUE;" 2>/dev/null || true

      - name: Deploy data to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: npx wrangler d1 execute iskipintro-db --file=./deploy.sql

      - name: Summary
        run: echo "✅ Data deployed to D1 successfully!"
