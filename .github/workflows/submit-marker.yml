name: Submit Marker
on:
  workflow_dispatch:
    inputs:
      series:
        description: "Series name (e.g. Breaking Bad)"
        required: true
        type: string
      season:
        description: "Season number"
        required: true
        type: string
      episode:
        description: "Episode number"
        required: true
        type: string
      marker_type:
        description: "Marker type"
        required: true
        type: choice
        options:
          - INTRO
          - RECAP
          - OPENING
          - ENDING
          - CREDITS
          - POST_CREDIT
          - LOGO
          - OTHER
      start_time:
        description: "Start time in seconds (e.g. 42.1)"
        required: true
        type: string
      end_time:
        description: "End time in seconds (e.g. 131.8)"
        required: true
        type: string
      source:
        description: "How did you get these timings?"
        required: true
        type: choice
        default: manual
        options:
          - manual
          - TMDB
          - IMDb
          - Jikan (MyAnimeList)
          - AniList
          - Kitsu

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Slugify series name
        id: slug
        run: |
          SLUG=$(echo "${{ inputs.series }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Generate YAML
        run: |
          SLUG="${{ steps.slug.outputs.slug }}"
          SEASON=$(printf '%02d' ${{ inputs.season }})
          EPISODE=$(printf '%02d' ${{ inputs.episode }})
          DIR="data/series/$SLUG/season-$SEASON"
          FILE="$DIR/episode-$EPISODE.yaml"
          # Normalize source: "Jikan (MyAnimeList)" -> "jikan", "TMDB" -> "tmdb"
          SOURCE=$(echo "${{ inputs.source }}" | sed 's/(.*//' | tr '[:upper:]' '[:lower:]' | xargs)

          mkdir -p "$DIR"

          if [ -f "$FILE" ]; then
            {
              echo "  - type: ${{ inputs.marker_type }}"
              echo "    start: ${{ inputs.start_time }}"
              echo "    end: ${{ inputs.end_time }}"
              echo "    confidence: 0.95"
              echo "    source: $SOURCE"
            } >> "$FILE"
          else
            {
              echo "series: ${{ inputs.series }}"
              echo "season: ${{ inputs.season }}"
              echo "episode: ${{ inputs.episode }}"
              echo "markers:"
              echo "  - type: ${{ inputs.marker_type }}"
              echo "    start: ${{ inputs.start_time }}"
              echo "    end: ${{ inputs.end_time }}"
              echo "    confidence: 0.95"
              echo "    source: $SOURCE"
            } > "$FILE"
          fi

          echo "Created/updated $FILE"
          cat "$FILE"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Add ${{ inputs.marker_type }} marker for ${{ inputs.series }} S${{ inputs.season }}E${{ inputs.episode }}"
          title: "Add ${{ inputs.marker_type }} marker for ${{ inputs.series }} S${{ inputs.season }}E${{ inputs.episode }}"
          body: |
            ## Marker Submission

            **Series:** ${{ inputs.series }}
            **Season:** ${{ inputs.season }}
            **Episode:** ${{ inputs.episode }}
            **Type:** ${{ inputs.marker_type }}
            **Start:** ${{ inputs.start_time }}s
            **End:** ${{ inputs.end_time }}s
            **Source:** ${{ inputs.source }}

            ---
            _Created automatically by the Submit Marker workflow_
          branch: "marker-${{ steps.slug.outputs.slug }}-s${{ inputs.season }}e${{ inputs.episode }}"
          base: main
          labels: marker-submission
