name: Submit Marker
on:
  workflow_dispatch:
    inputs:
      type:
        description: "Content type"
        required: true
        type: choice
        options:
          - TV Series
          - Anime
          - Movie
      title:
        description: "Movie title, series name, or anime name"
        required: true
        type: string
      season:
        description: "Season number (skip for movies)"
        required: false
        type: string
      episode:
        description: "Episode number (skip for movies)"
        required: false
        type: string
      marker_type:
        description: "Marker type"
        required: true
        type: choice
        options:
          - INTRO
          - RECAP
          - OPENING
          - ENDING
          - CREDITS
          - POST_CREDIT
          - LOGO
          - OTHER
      start_time:
        description: "Start time in seconds (e.g. 42.1)"
        required: true
        type: string
      end_time:
        description: "End time in seconds (e.g. 131.8)"
        required: true
        type: string
      source:
        description: "How did you get these timings?"
        required: true
        type: choice
        default: manual
        options:
          - manual
          - TMDB
          - IMDb
          - Jikan (MyAnimeList)
          - AniList
          - Kitsu
      tmdb_id:
        description: "TMDB series ID (optional)"
        required: false
        type: string
      imdb_id:
        description: "IMDb ID - tt0123456 (optional)"
        required: false
        type: string
      mal_id:
        description: "MyAnimeList ID (optional)"
        required: false
        type: string
      anilist_id:
        description: "AniList ID (optional)"
        required: false
        type: string
      kitsu_id:
        description: "Kitsu ID (optional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Slugify title
        id: slug
        run: |
          SLUG=$(echo "${{ inputs.title }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Generate YAML
        run: |
          SLUG="${{ steps.slug.outputs.slug }}"
          SOURCE=$(echo "${{ inputs.source }}" | sed 's/(.*//' | tr '[:upper:]' '[:lower:]' | xargs)

          if [ "${{ inputs.type }}" = "Movie" ]; then
            FILE="data/movies/$SLUG.yaml"

            if [ -f "$FILE" ]; then
              {
                echo "  - type: ${{ inputs.marker_type }}"
                echo "    start: ${{ inputs.start_time }}"
                echo "    end: ${{ inputs.end_time }}"
                echo "    confidence: 0.95"
                echo "    source: $SOURCE"
              } >> "$FILE"
            else
              {
                echo "title: ${{ inputs.title }}"
                [ -n "${{ inputs.tmdb_id }}" ] && echo "tmdb_id: ${{ inputs.tmdb_id }}"
                [ -n "${{ inputs.imdb_id }}" ] && echo "imdb_id: ${{ inputs.imdb_id }}"
                echo "markers:"
                echo "  - type: ${{ inputs.marker_type }}"
                echo "    start: ${{ inputs.start_time }}"
                echo "    end: ${{ inputs.end_time }}"
                echo "    confidence: 0.95"
                echo "    source: $SOURCE"
              } > "$FILE"
            fi
          else
            SEASON=$(printf '%02d' ${{ inputs.season }})
            EPISODE=$(printf '%02d' ${{ inputs.episode }})
            DIR="data/series/$SLUG/season-$SEASON"
            FILE="$DIR/episode-$EPISODE.yaml"
            ANIME=$([ "${{ inputs.type }}" = "Anime" ] && echo "true" || echo "false")
            mkdir -p "$DIR"

            if [ -f "$FILE" ]; then
              {
                echo "  - type: ${{ inputs.marker_type }}"
                echo "    start: ${{ inputs.start_time }}"
                echo "    end: ${{ inputs.end_time }}"
                echo "    confidence: 0.95"
                echo "    source: $SOURCE"
              } >> "$FILE"
            else
              {
                echo "series: ${{ inputs.title }}"
                echo "season: ${{ inputs.season }}"
                echo "episode: ${{ inputs.episode }}"
                echo "anime: $ANIME"
                [ -n "${{ inputs.tmdb_id }}" ] && echo "tmdb_id: ${{ inputs.tmdb_id }}"
                [ -n "${{ inputs.imdb_id }}" ] && echo "imdb_id: ${{ inputs.imdb_id }}"
                [ -n "${{ inputs.mal_id }}" ] && echo "mal_id: ${{ inputs.mal_id }}"
                [ -n "${{ inputs.anilist_id }}" ] && echo "anilist_id: ${{ inputs.anilist_id }}"
                [ -n "${{ inputs.kitsu_id }}" ] && echo "kitsu_id: ${{ inputs.kitsu_id }}"
                echo "markers:"
                echo "  - type: ${{ inputs.marker_type }}"
                echo "    start: ${{ inputs.start_time }}"
                echo "    end: ${{ inputs.end_time }}"
                echo "    confidence: 0.95"
                echo "    source: $SOURCE"
              } > "$FILE"
            fi
          fi

          echo "Created/updated $FILE"
          cat "$FILE"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Add ${{ inputs.marker_type }} marker for ${{ inputs.title }}"
          title: "Add ${{ inputs.marker_type }} marker for ${{ inputs.title }}"
          body: |
            ## Marker Submission

            **Type:** ${{ inputs.type }}
            **Title:** ${{ inputs.title }}
            **Season:** ${{ inputs.season }}
            **Episode:** ${{ inputs.episode }}
            **Marker:** ${{ inputs.marker_type }}
            **Start:** ${{ inputs.start_time }}s
            **End:** ${{ inputs.end_time }}s
            **Source:** ${{ inputs.source }}
            **TMDB ID:** ${{ inputs.tmdb_id }}
            **IMDb ID:** ${{ inputs.imdb_id }}
            **MAL ID:** ${{ inputs.mal_id }}
            **AniList ID:** ${{ inputs.anilist_id }}
            **Kitsu ID:** ${{ inputs.kitsu_id }}

            ---
            _Created automatically by the Submit Marker workflow_
          branch: "marker-${{ steps.slug.outputs.slug }}-${{ inputs.marker_type }}"
          base: main
          labels: marker-submission
