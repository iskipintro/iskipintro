name: Submit Marker
description: Submit playback markers (intro, recap, credits, etc.) for a series or movie
title: "Markers: [SERIES] S[##]E[##]"
labels: [marker-submission]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing! Fill out the form below and a maintainer will convert your submission into a YAML file and merge it.

  - type: dropdown
    id: source_type
    attributes:
      label: Type
      description: Is this a TV series, anime, or movie?
      options:
        - TV Series
        - Anime
        - Movie
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Title
      description: Movie title, series name, or anime name
      placeholder: e.g. Breaking Bad or The Shawshank Redemption
    validations:
      required: true

  - type: input
    id: season
    attributes:
      label: Season number
      description: Required for TV series and anime
      placeholder: "1"
    validations:
      required: false

  - type: input
    id: episode
    attributes:
      label: Episode number
      description: Required for TV series and anime
      placeholder: "1"
    validations:
      required: false

  - type: dropdown
    id: marker_type
    attributes:
      label: Marker type
      description: What kind of marker is this?
      options:
        - INTRO
        - RECAP
        - OPENING
        - ENDING
        - CREDITS
        - POST_CREDIT
        - LOGO
        - OTHER
    validations:
      required: true

  - type: input
    id: start
    attributes:
      label: Start time (seconds)
      description: When does this segment begin?
      placeholder: e.g. 42.1
    validations:
      required: true

  - type: input
    id: end
    attributes:
      label: End time (seconds)
      description: When does this segment end?
      placeholder: e.g. 131.8
    validations:
      required: true

  - type: input
    id: tmdb_id
    attributes:
      label: TMDB ID (optional)
      description: Series ID from themoviedb.org
      placeholder: e.g. 1396

  - type: input
    id: imdb_id
    attributes:
      label: IMDb ID (optional)
      placeholder: e.g. tt0903747

  - type: input
    id: mal_id
    attributes:
      label: MyAnimeList ID (optional)
      placeholder: e.g. 1535

  - type: input
    id: anilist_id
    attributes:
      label: AniList ID (optional)
      placeholder: e.g. 16498

  - type: input
    id: kitsu_id
    attributes:
      label: Kitsu ID (optional)
      placeholder: e.g. 4224

  - type: textarea
    id: comment
    attributes:
      label: Comment (optional)
      description: Any additional context
      placeholder: e.g. Cold open starts after the recap
